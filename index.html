<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGC · Diario AMD</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8A6F32;
    --gold-glow: rgba(201,168,76,0.15);
    --bg: #0A0A0B;
    --bg2: #111113;
    --bg3: #181819;
    --bg4: #1F1F22;
    --border: rgba(201,168,76,0.2);
    --border-strong: rgba(201,168,76,0.45);
    --text: #E8E4DC;
    --text-dim: #7A7670;
    --text-mid: #B0AA9F;
    --win: #4CAF7D;
    --loss: #E05555;
    --be: #7A9FC4;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,11,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--gold);
  }
  .logo span { color: var(--text-dim); font-size: 13px; margin-left: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }

  .header-right { display: flex; gap: 8px; align-items: center; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .btn.primary {
    background: var(--gold);
    border-color: var(--gold);
    color: #0A0A0B;
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--gold-light); }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 56px); position: relative; z-index: 1; }

  /* SIDEBAR CALENDAR */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cal-header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--gold);
  }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cal-nav button:hover { border-color: var(--gold-dim); color: var(--gold); }

  .cal-grid { padding: 12px; }
  .cal-days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 4px 0;
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    color: var(--text-mid);
    border: 1px solid transparent;
  }
  .cal-day:hover { background: var(--bg4); border-color: var(--border); color: var(--text); }
  .cal-day.today { color: var(--gold); border-color: var(--gold-dim); }
  .cal-day.selected { background: var(--gold); color: #0A0A0B; font-weight: 500; }
  .cal-day.has-data::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
  }
  .cal-day.has-data.selected::after { background: #0A0A0B; }
  .cal-day.empty { pointer-events: none; color: transparent; }
  .cal-day.weekend { color: var(--text-dim); }

  /* RECENT LIST */
  .recent-section {
    flex: 1;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .recent-title {
    padding: 14px 20px 8px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .recent-item {
    padding: 10px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .recent-item:hover { background: var(--bg4); }
  .recent-item.active { background: var(--gold-glow); border-left: 2px solid var(--gold); padding-left: 18px; }
  .recent-date { font-size: 11px; color: var(--text-mid); }
  .recent-pnl { font-size: 11px; font-weight: 500; }
  .pnl-win { color: var(--win); }
  .pnl-loss { color: var(--loss); }
  .pnl-neutral { color: var(--text-dim); }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 32px;
    background: var(--bg);
    min-width: 0;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
  }
  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
    font-family: 'Cormorant Garamond', serif;
  }
  .empty-state p { font-size: 12px; letter-spacing: 0.08em; }

  /* DAY HEADER */
  .day-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .day-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .day-weekday {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .day-summary-badges { display: flex; gap: 8px; align-items: center; }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .badge-win { background: rgba(76,175,125,0.15); color: var(--win); border: 1px solid rgba(76,175,125,0.3); }
  .badge-loss { background: rgba(224,85,85,0.15); color: var(--loss); border: 1px solid rgba(224,85,85,0.3); }
  .badge-be { background: rgba(122,159,196,0.15); color: var(--be); border: 1px solid rgba(122,159,196,0.3); }

  /* SECTION */
  .section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: visible;
  }
  .section-header {
    padding: 14px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .section-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }
  .section-body { padding: 20px; }

  /* TEXTAREA */
  textarea {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    min-height: 100px;
    max-height: 600px;
    transition: border-color 0.2s;
    outline: none;
    display: block;
    box-sizing: border-box;
    overflow-y: auto;
  }
  textarea:focus { border-color: var(--gold-dim); }
  textarea::placeholder { color: var(--text-dim); }

  /* CONTEXT GRID */
  .context-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .context-item label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--gold-dim); }
  select option { background: var(--bg3); }

  /* BIAS TOGGLE */
  .bias-toggle { display: flex; gap: 6px; }
  .bias-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.08em;
  }
  .bias-btn.bullish.active { background: rgba(76,175,125,0.2); border-color: var(--win); color: var(--win); }
  .bias-btn.bearish.active { background: rgba(224,85,85,0.2); border-color: var(--loss); color: var(--loss); }

  /* TRADE CARD */
  .trade-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: visible;
  }
  .trade-card-header {
    padding: 12px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .trade-num {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .trade-result-select {
    display: flex; gap: 5px;
  }
  .result-btn {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
    color: var(--text-dim);
  }
  .result-btn.win.active { background: rgba(76,175,125,0.2); border-color: var(--win); color: var(--win); }
  .result-btn.loss.active { background: rgba(224,85,85,0.2); border-color: var(--loss); color: var(--loss); }
  .result-btn.be.active { background: rgba(122,159,196,0.2); border-color: var(--be); color: var(--be); }

  .trade-card-body { padding: 16px; }

  .trade-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .trade-grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }

  /* CHECKLIST */
  .checklist { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg4);
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    color: var(--text-mid);
  }
  .check-item:hover { border-color: var(--border); }
  .check-item.checked { border-color: rgba(201,168,76,0.3); color: var(--text); }
  .check-item.checked .check-box { background: var(--gold); border-color: var(--gold); }
  .check-item.checked .check-box::after { opacity: 1; }
  .check-box {
    width: 16px; height: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
  }
  .check-box::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #0A0A0B;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .check-section-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin: 10px 0 6px;
  }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .img-upload-area:hover { border-color: var(--gold-dim); background: var(--gold-glow); }
  .img-upload-area p { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .img-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .img-preview {
    aspect-ratio: 16/9;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    background: var(--bg4);
  }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview .remove-img {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .img-preview:hover .remove-img { opacity: 1; }

  /* QUALITY SCORE */
  .quality-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .quality-item { text-align: center; }
  .quality-item label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
  .quality-toggle { display: flex; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .quality-btn {
    flex: 1;
    padding: 5px 4px;
    border: none;
    background: transparent;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .quality-btn.yes.active { background: rgba(76,175,125,0.25); color: var(--win); }
  .quality-btn.no.active { background: rgba(224,85,85,0.25); color: var(--loss); }

  /* WEEKLY SUMMARY */
  .weekly-panel {
    position: fixed;
    right: 0; top: 56px;
    width: 280px;
    height: calc(100vh - 56px);
    background: var(--bg2);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 50;
    overflow-y: auto;
    padding: 24px;
  }
  .weekly-panel.open { transform: translateX(0); }
  .weekly-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: 0.08em;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    font-size: 11px;
  }
  .stat-label { color: var(--text-dim); letter-spacing: 0.05em; }
  .stat-value { color: var(--text); font-weight: 500; }
  .stat-value.positive { color: var(--win); }
  .stat-value.negative { color: var(--loss); }
  .weekly-bar { margin: 16px 0; }
  .weekly-bar-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .bar-track { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
  .bar-fill.loss-bar { background: var(--loss); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  /* SAVE INDICATOR */
  .save-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
  }
  .save-indicator.show { opacity: 1; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  input[type="file"] { display: none; }

  .session-select {
    display: flex; gap: 6px;
  }
  .sess-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .sess-btn.active { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }
</style>
</head>
<body>

<header>
  <div class="logo">MGC <span>· Diario AMD</span></div>
  <div class="header-right">
    <button class="btn" onclick="toggleWeekly()">Riepilogo Settimana</button>
    <button class="btn primary" onclick="saveDay()">Salva Giornata</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="cal-header">
      <div class="cal-month" id="calMonth"></div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">
        <div class="cal-day-name">L</div>
        <div class="cal-day-name">M</div>
        <div class="cal-day-name">M</div>
        <div class="cal-day-name">G</div>
        <div class="cal-day-name">V</div>
        <div class="cal-day-name">S</div>
        <div class="cal-day-name">D</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="recent-section">
      <div class="recent-title">Giorni Recenti</div>
      <div id="recentList"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◈</div>
      <p>Seleziona un giorno dal calendario</p>
      <p style="color:var(--gold-dim)">o clicca su oggi per iniziare</p>
      <button class="btn primary" style="margin-top:8px" onclick="selectToday()">Apri Oggi</button>
    </div>
    <div id="dayContent" style="display:none"></div>
  </div>
</div>

<!-- WEEKLY PANEL -->
<div class="weekly-panel" id="weeklyPanel">
  <div class="weekly-title">Settimana</div>
  <div id="weeklyContent"></div>
</div>

<!-- SAVE INDICATOR -->
<div class="save-indicator" id="saveInd">✓ Salvato</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentDate = null;
let currentYear, currentMonth;
const today = new Date();

// Storage helpers
function storageKey(dateStr) { return 'mgc_day_' + dateStr; }
function saveData(dateStr, data) {
  try { localStorage.setItem(storageKey(dateStr), JSON.stringify(data)); } catch(e) {}
}
function loadData(dateStr) {
  try {
    const d = localStorage.getItem(storageKey(dateStr));
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}
function getAllDays() {
  const days = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('mgc_day_')) {
      const dateStr = k.replace('mgc_day_', '');
      days.push(dateStr);
    }
  }
  return days.sort().reverse();
}

function formatDate(d) {
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return yyyy + '-' + mm + '-' + dd;
}
function parseDateStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function displayDate(dateStr) {
  const d = parseDateStr(dateStr);
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  return { day: d.getDate(), month: months[d.getMonth()], year: d.getFullYear(), weekday: days[d.getDay()] };
}

// ============================================================
// CALENDAR
// ============================================================
function initCalendar() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  renderCalendar();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

function renderCalendar() {
  const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  document.getElementById('calMonth').textContent = months[currentMonth] + ' ' + currentYear;

  const allDays = getAllDays();
  const daysContainer = document.getElementById('calDays');
  daysContainer.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay(); // 0=sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const todayStr = formatDate(today);

  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    daysContainer.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(currentYear, currentMonth, d);
    const dateStr = formatDate(dateObj);
    const el = document.createElement('div');
    const dow = dateObj.getDay();
    let cls = 'cal-day';
    if (dow === 0 || dow === 6) cls += ' weekend';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === currentDate) cls += ' selected';
    if (allDays.includes(dateStr)) cls += ' has-data';
    el.className = cls;
    el.textContent = d;
    el.onclick = () => selectDay(dateStr);
    daysContainer.appendChild(el);
  }

  renderRecent();
}

function renderRecent() {
  const allDays = getAllDays().slice(0, 15);
  const container = document.getElementById('recentList');
  container.innerHTML = '';
  if (allDays.length === 0) {
    container.innerHTML = '<div style="padding:16px 20px;font-size:11px;color:var(--text-dim)">Nessun giorno registrato</div>';
    return;
  }
  allDays.forEach(dateStr => {
    const data = loadData(dateStr);
    const pnl = calcDayPnL(data);
    const { day, month } = displayDate(dateStr);
    const el = document.createElement('div');
    el.className = 'recent-item' + (dateStr === currentDate ? ' active' : '');
    el.innerHTML = `
      <span class="recent-date">${day} ${month.slice(0,3)}</span>
      <span class="recent-pnl ${pnl > 0 ? 'pnl-win' : pnl < 0 ? 'pnl-loss' : 'pnl-neutral'}">${pnl !== 0 ? (pnl > 0 ? '+' : '') + pnl.toFixed(0) + '$' : '—'}</span>
    `;
    el.onclick = () => selectDay(dateStr);
    container.appendChild(el);
  });
}

function calcDayPnL(data) {
  if (!data || !data.trades) return 0;
  let total = 0;
  data.trades.forEach(t => {
    const v = parseFloat(t.pnl);
    if (!isNaN(v)) total += v;
  });
  return total;
}

function selectToday() { selectDay(formatDate(today)); }

function selectDay(dateStr) {
  currentDate = dateStr;
  renderCalendar();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dayContent').style.display = 'block';
  renderDayContent(dateStr);
}

function renderDayContent(dateStr) {
  const data = loadData(dateStr) || defaultDayData();
  const { day, month, year, weekday } = displayDate(dateStr);
  const pnl = calcDayPnL(data);

  let badgesHtml = '';
  if (data.trades) {
    const wins = data.trades.filter(t=>t.result==='win').length;
    const losses = data.trades.filter(t=>t.result==='loss').length;
    const bes = data.trades.filter(t=>t.result==='be').length;
    if (wins) badgesHtml += `<span class="badge badge-win">WIN ${wins}</span>`;
    if (losses) badgesHtml += `<span class="badge badge-loss">LOSS ${losses}</span>`;
    if (bes) badgesHtml += `<span class="badge badge-be">BE ${bes}</span>`;
  }
  if (pnl !== 0) badgesHtml += `<span class="badge ${pnl>0?'badge-win':'badge-loss'}">${pnl>0?'+':''}${pnl.toFixed(0)}$</span>`;

  const container = document.getElementById('dayContent');
  container.innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-date">${day} ${month} ${year}</div>
        <div class="day-weekday">${weekday}</div>

          <div class="context-item">
            <label>Asian High (AH)</label>

          </div>
          <div class="context-item">
            <label>Asian Low (AL)</label>
            <input type="text" id="ctx_al" placeholder="es. 3271.0" value="${data.context.al}">
          </div>
          <div class="context-item">
            <label>PDH / PDL</label>
            <input type="text" id="ctx_pdh" placeholder="es. 3290 / 3260" value="${data.context.pdh}">
          </div>
        </div>
        <div class="context-grid">
          <div class="context-item" style="grid-column: span 2">
            <label>News del giorno</label>
            <input type="text" id="ctx_news" placeholder="es. CPI ore 14:30 — alto impatto" value="${data.context.news}">
          </div>

              <button class="bias-btn bearish ${data.context.bias==='bearish'?'active':''}" onclick="setBias('bearish')">▼ BEAR</button>

    <!-- SESSIONE OPERATIVA -->

      <div class="section-header"><div class="dot"></div>Sessione Operativa</div>

    context: { ah: '', al: '', pdh: '', news: '', bias: '' },
    notes: '',
    trades: [defaultTrade(), defaultTrade(), defaultTrade()],
    session: '',
    images: []
  };
}

// ============================================================
// INTERACTIONS
// ============================================================
let tempBias = '';
let tempSession = '';

function setBias(val) {
  tempBias = val;
  document.querySelectorAll('.bias-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.bias-btn.' + val).forEach(b => b.classList.add('active'));
}

function setSession(val) {
  tempSession = val;
  document.querySelectorAll('.sess-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function setTradeResult(idx, val) {
  const data = loadData(currentDate) || defaultDayData();
  if (!data.trades[idx]) data.trades[idx] = defaultTrade();
  data.trades[idx].result = data.trades[idx].result === val ? '' : val;
  saveData(currentDate, data);
  // Re-render just the buttons
  document.querySelectorAll(`#tradeCard${idx} .result-btn`).forEach(b => b.classList.remove('active'));
  if (data.trades[idx].result) {
    document.querySelector(`#tradeCard${idx} .result-btn.${data.trades[idx].result}`).classList.add('active');
  }
}

function toggleCheck(idx, key, el) {
  el.classList.toggle('checked');
}

function setQuality(idx, key, val, btn) {
  const siblings = btn.parentElement.querySelectorAll('.quality-btn');
  siblings.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ============================================================
// SAVE
// ============================================================
function collectDayData() {
  const data = loadData(currentDate) || defaultDayData();

  // Context
  data.context.ah = document.getElementById('ctx_ah')?.value || '';
  data.context.al = document.getElementById('ctx_al')?.value || '';
  data.context.pdh = document.getElementById('ctx_pdh')?.value || '';
  data.context.news = document.getElementById('ctx_news')?.value || '';
  data.context.bias = tempBias || data.context.bias;
  data.notes = document.getElementById('dayNotes')?.value || '';
  data.session = tempSession || data.session;

  // Trades
  [0,1,2].forEach(i => {
    if (!data.trades[i]) data.trades[i] = defaultTrade();
    const t = data.trades[i];
    t.direction = document.getElementById(`t${i}_dir`)?.value || '';
    t.contracts = document.getElementById(`t${i}_contracts`)?.value || '1';
    t.entry = document.getElementById(`t${i}_entry`)?.value || '';
    t.sl = document.getElementById(`t${i}_sl`)?.value || '';
    t.t1 = document.getElementById(`t${i}_t1`)?.value || '';
    t.t2 = document.getElementById(`t${i}_t2`)?.value || '';
    t.pnl = document.getElementById(`t${i}_pnl`)?.value || '';
    t.rr = document.getElementById(`t${i}_rr`)?.value || '';
    t.entryType = document.getElementById(`t${i}_etype`)?.value || '';
    t.fomo = document.getElementById(`t${i}_fomo`)?.value || '';
    t.notes = document.getElementById(`t${i}_notes`)?.value || '';

    // Checks
    document.querySelectorAll(`#checks_${i} .check-item`).forEach(el => {
      const key = el.getAttribute('data-key');
      if (!key) {
        // Read from DOM state
      }
    });
    // Read checks from DOM
    const checkEls = document.querySelectorAll(`#checks_${i} .check-item`);
    const checkKeys = ['ah_al','bias_def','pdh_pdl','no_news','sweep','no_close','reentry','volume','bias_ok','fvg','ifvg','entry_type','sl_ok','pnl_calc','sl_limit'];
    checkEls.forEach((el, j) => {
      if (checkKeys[j]) t.checks[checkKeys[j]] = el.classList.contains('checked');
    });

    // Quality
    const qualKeys = ['bias','sweep','ifvg','volume','deadzone'];
    const qualGrids = document.querySelectorAll(`#tradeCard${i} .quality-grid .quality-item`);
    qualGrids.forEach((grid, j) => {
      const activeBtn = grid.querySelector('.quality-btn.active');
      if (activeBtn) t.quality[qualKeys[j]] = activeBtn.classList.contains('yes') ? 'si' : 'no';
      else t.quality[qualKeys[j]] = '';
    });
  });

  return data;
}

function saveDay() {
  if (!currentDate) return;
  const data = collectDayData();
  saveData(currentDate, data);
  renderCalendar();

  // Show indicator
  const ind = document.getElementById('saveInd');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2000);
}

// Auto-save on input
document.addEventListener('input', () => {
  if (currentDate) {
    clearTimeout(window._autoSave);
    window._autoSave = setTimeout(() => {
      const data = collectDayData();
      saveData(currentDate, data);
      renderCalendar();
    }, 800);
  }
});

// ============================================================
// IMAGES
// ============================================================
function handleImages(event) {
  const files = Array.from(event.target.files);
  const data = loadData(currentDate) || defaultDayData();
  if (!data.images) data.images = [];

  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      data.images.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        saveData(currentDate, data);
        renderImages(data.images);
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderImages(images) {
  const grid = document.getElementById('imgPreviewGrid');
  if (!grid) return;
  grid.innerHTML = '';
  (images || []).forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'img-preview';
    div.innerHTML = `
      <img src="${src}" alt="screenshot ${i+1}">
      <button class="remove-img" onclick="removeImage(${i})">×</button>
    `;
    grid.appendChild(div);
  });
}

function removeImage(idx) {
  const data = loadData(currentDate);
  if (!data || !data.images) return;
  data.images.splice(idx, 1);
  saveData(currentDate, data);
  renderImages(data.images);
}

// ============================================================
// WEEKLY SUMMARY
// ============================================================
let weeklyOpen = false;
function toggleWeekly() {
  weeklyOpen = !weeklyOpen;
  document.getElementById('weeklyPanel').classList.toggle('open', weeklyOpen);
  if (weeklyOpen) renderWeekly();
}

function getWeekDays() {
  const ref = currentDate ? parseDateStr(currentDate) : today;
  const dow = ref.getDay();
  const monday = new Date(ref);
  monday.setDate(ref.getDate() - (dow === 0 ? 6 : dow - 1));
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(formatDate(d));
  }
  return days;
}

function renderWeekly() {
  const weekDays = getWeekDays();
  let totalTrades = 0, wins = 0, losses = 0, bes = 0, totalPnl = 0;
  let londonTrades = 0, londonWins = 0, nyTrades = 0, nyWins = 0;

  weekDays.forEach(dateStr => {
    const data = loadData(dateStr);
    if (!data) return;
    (data.trades || []).forEach(t => {
      if (!t.result) return;
      totalTrades++;
      totalPnl += parseFloat(t.pnl) || 0;
      if (t.result === 'win') wins++;
      if (t.result === 'loss') losses++;
      if (t.result === 'be') bes++;
    });
    if (data.session === 'london' || data.session === 'entrambe') {
      (data.trades || []).forEach(t => {
        if (!t.result) return;
        londonTrades++;
        if (t.result === 'win') londonWins++;
      });
    }
    if (data.session === 'ny' || data.session === 'entrambe') {
      (data.trades || []).forEach(t => {
        if (!t.result) return;
        nyTrades++;
        if (t.result === 'win') nyWins++;
      });
    }
  });

  const winRate = totalTrades > 0 ? Math.round(wins / totalTrades * 100) : 0;
  const monday = weekDays[0];
  const { day: d1, month: m1 } = displayDate(monday);
  const { day: d2, month: m2 } = displayDate(weekDays[4]);

  document.getElementById('weeklyContent').innerHTML = `
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:16px;letter-spacing:0.05em">${d1} ${m1.slice(0,3)} — ${d2} ${m2.slice(0,3)}</div>

    <div class="stat-row">
      <span class="stat-label">Trade totali</span>
      <span class="stat-value">${totalTrades}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">WIN / LOSS / BE</span>
      <span class="stat-value">${wins} / ${losses} / ${bes}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Win Rate</span>
      <span class="stat-value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">P&L totale</span>
      <span class="stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(0)}$</span>
    </div>

    <div style="margin: 20px 0 8px;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dim)">Per Sessione</div>
    <div class="stat-row">
      <span class="stat-label">London</span>
      <span class="stat-value">${londonWins}/${londonTrades} trade</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">New York</span>
      <span class="stat-value">${nyWins}/${nyTrades} trade</span>
    </div>

    <div class="weekly-bar" style="margin-top:20px">
      <div class="weekly-bar-label">Win Rate</div>
      <div class="bar-track"><div class="bar-fill" style="width:${winRate}%"></div></div>
    </div>
    <div class="weekly-bar">
      <div class="weekly-bar-label">Loss Rate</div>
      <div class="bar-track"><div class="bar-fill loss-bar" style="width:${totalTrades > 0 ? Math.round(losses/totalTrades*100) : 0}%"></div></div>
    </div>

    <div style="margin-top:24px">
      ${weekDays.map(dateStr => {
        const data = loadData(dateStr);
        const pnl = calcDayPnL(data);
        const { day, month } = displayDate(dateStr);
        const hasTrades = data && data.trades && data.trades.some(t => t.result);
        return `
          <div class="stat-row" style="cursor:pointer" onclick="selectDay('${dateStr}')">
            <span class="stat-label">${day} ${month.slice(0,3)}</span>
            <span class="stat-value ${pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : ''}">${hasTrades ? (pnl >= 0 ? '+' : '') + pnl.toFixed(0) + '$' : '—'}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ============================================================

initCalendar();
</script>
</body>
</html>
